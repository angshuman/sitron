<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SITRON</title>
<style>
:root{--bg:#030302;--ink:#060504;--paper:#ead7b8;--bone:#f2e4c7;--blood:#d92b1f;--blood2:#8d1410;--jade:#178577;--saffron:#f29a22;--gold:#d8b457;--ember:#b8432a;--teal:#1a7a6e;--cream:#e8d5b7;--dim:#5b4631;--text:#bda786;--bright:#f0ddba;--font:'JetBrains Mono','Fira Code',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);overflow:hidden;height:100vh;font-family:var(--font);color:var(--text)}
body::before{content:"";position:fixed;inset:0;z-index:5;pointer-events:none;mix-blend-mode:overlay;opacity:.28;background:repeating-linear-gradient(0deg,#fff1 0 1px,#0000 1px 3px),radial-gradient(circle at 20% 20%,#fff1,#0000 30%),radial-gradient(circle at 80% 70%,#0008,#0000 40%)}
body::after{content:"";position:fixed;inset:-20%;z-index:6;pointer-events:none;opacity:.13;background:linear-gradient(112deg,#0000 0 39%,var(--blood2) 40% 42%,#0000 43% 100%);filter:blur(.4px);animation:slash 12s ease-in-out infinite alternate}
#boot{position:fixed;inset:0;z-index:1000;background:radial-gradient(circle at 50% 42%,#2a1009 0,#070503 38%,#000 75%);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity 1.5s}
#boot.gone{opacity:0;pointer-events:none}
#boot h1{font-size:clamp(3rem,10vw,8rem);font-weight:900;color:var(--paper);letter-spacing:.55em;text-shadow:8px 8px 0 #000,0 0 70px #d92b1f55;margin-bottom:.12em;transform:skew(-7deg);filter:contrast(1.2)}
#boot .sub{font-size:.62rem;color:var(--blood);letter-spacing:.55em;text-transform:uppercase;margin-bottom:5em;background:#000b;border:1px solid #ead7b822;padding:8px 14px}
#boot .orb{width:118px;height:118px;border:4px solid #f2e4c7;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:pulse 3s ease-in-out infinite;background:radial-gradient(circle,#d92b1f 0 15%,#000 18% 100%);box-shadow:12px 12px 0 #000}
#boot .orb::after{content:'▶';color:var(--paper);font-size:1.8rem;margin-left:5px;text-shadow:3px 3px 0 #000}
@keyframes pulse{0%,100%{box-shadow:10px 10px 0 #000,0 0 12px #d92b1f55}50%{box-shadow:16px 16px 0 #000,0 0 80px #d92b1f88}}
@keyframes slash{0%{transform:translateX(-4%) rotate(-1deg)}100%{transform:translateX(4%) rotate(1deg)}}
#boot .hint{margin-top:3em;font-size:.52rem;color:#7d5a36;letter-spacing:.35em;text-transform:uppercase}
canvas{display:block;position:fixed;inset:0}
#ui{position:fixed;top:0;right:0;bottom:0;width:min(410px,92vw);background:linear-gradient(90deg,#060504e8,#120b06f4);border-left:4px solid #ead7b8;box-shadow:-18px 0 0 #0008,-40px 0 80px #000;backdrop-filter:blur(18px) saturate(1.4);transform:translateX(104%) skewX(-1deg);transition:transform .55s cubic-bezier(.18,.8,.2,1);z-index:100;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:16px}
#ui.open{transform:translateX(0) skewX(0)}
#ui::-webkit-scrollbar{width:2px}
#ui::-webkit-scrollbar-thumb{background:var(--blood)}
#tog{position:fixed;top:16px;right:16px;z-index:200;background:#050403e8;border:2px solid var(--paper);color:var(--paper);padding:10px 15px;font:.72rem/1 var(--font);letter-spacing:.2em;cursor:pointer;border-radius:0;backdrop-filter:blur(8px);transition:all .3s;box-shadow:7px 7px 0 #000;transform:skew(-8deg)}
#tog:hover{color:#fff;background:var(--blood);border-color:#fff;transform:skew(-8deg) translate(-2px,-2px)}
.pnl{border:1px solid #ead7b826;border-left:5px solid #ead7b8;border-radius:0;padding:15px;background:linear-gradient(135deg,#f2e4c70b,#0000 45%),#080604bb;box-shadow:8px 8px 0 #0007;position:relative;overflow:hidden}
.pnl::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blood),#0000)}
.pnl-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pnl-t{font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--paper);text-shadow:3px 3px 0 #000}
.badge{font-size:.43rem;padding:3px 7px;border-radius:0;background:var(--blood);color:#fff;border:1px solid #fff3;box-shadow:3px 3px 0 #000}
.row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.row:last-child{margin-bottom:0}
.lbl{font-size:.52rem;color:#8d6c48;text-transform:uppercase;letter-spacing:.12em;min-width:58px;flex-shrink:0}
.val{font-size:.56rem;color:var(--paper);min-width:34px;text-align:right;flex-shrink:0}
input[type="range"]{-webkit-appearance:none;height:4px;background:linear-gradient(90deg,var(--blood),#1a1208);border-radius:0;outline:none;flex:1}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:18px;border-radius:0;background:var(--paper);border:2px solid #000;cursor:pointer;box-shadow:3px 3px 0 #000}
select{background:#020201;color:var(--paper);border:1px solid #ead7b83d;padding:6px 8px;font:.57rem/1.4 var(--font);border-radius:0;cursor:pointer;outline:none}
.btn{background:#000;border:1px solid #ead7b833;color:var(--text);padding:6px 11px;font:.52rem/1 var(--font);letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:0;transition:all .2s;box-shadow:3px 3px 0 #000}
.btn:hover{border-color:var(--paper);color:var(--paper);background:#1a1008}
.btn.on{border-color:#fff;background:var(--blood);color:#fff}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}
.lrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #ead7b80d}
.ldot{width:9px;height:9px;border-radius:0;flex-shrink:0;transition:all .3s;transform:rotate(45deg)}
.ldot.on{box-shadow:0 0 6px currentColor}
.ldot.off{opacity:.2}
.lname{font-size:.55rem;color:var(--text);letter-spacing:.12em;flex:1;cursor:pointer}
.lrow input[type="range"]{width:50px;flex:none}
.lrow .btn{padding:3px 7px}
#info{position:fixed;top:22px;left:24px;z-index:50;pointer-events:none;background:#030302b5;border-left:7px solid var(--blood);padding:12px 16px 11px 15px;box-shadow:9px 9px 0 #000;max-width:min(520px,70vw)}
#info .raag{font-size:clamp(1.5rem,4vw,3.1rem);font-weight:900;color:var(--paper);letter-spacing:.1em;text-shadow:4px 4px 0 #000,0 0 30px #d92b1f44;transform:skew(-6deg)}
#info .meta{font-size:.5rem;color:#9e7f55;letter-spacing:.24em;margin-top:6px;text-transform:uppercase}
#tel{position:fixed;bottom:22px;left:24px;font-size:.48rem;color:#715639;line-height:2.05;pointer-events:none;z-index:50;background:#030302aa;border-top:1px solid #ead7b827;border-left:4px solid #ead7b8;padding:10px 14px;box-shadow:7px 7px 0 #000;min-width:210px}
#tel .v{color:var(--paper)}
#ringtip{position:fixed;pointer-events:none;z-index:300;opacity:0;transition:opacity .22s,transform .22s;transform:translateY(8px) skew(-1deg);padding:16px 19px;background:#030302f4;border:2px solid var(--paper);border-left:8px solid var(--blood);border-radius:0;backdrop-filter:blur(12px);max-width:300px;min-width:210px;box-shadow:12px 12px 0 #000}
#ringtip.show{opacity:1;transform:translateY(0) skew(-1deg)}
#ringtip .rt-name{font-size:.74rem;color:var(--paper);letter-spacing:.18em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:9px;text-shadow:3px 3px 0 #000}
#ringtip .rt-dot{width:10px;height:10px;border-radius:0;display:inline-block;transform:rotate(45deg)}
#ringtip .rt-desc{font-size:.52rem;color:var(--text);line-height:1.75;letter-spacing:.04em}
#ringtip .rt-stat{font-size:.48rem;color:#72573a;margin-top:9px;padding-top:7px;border-top:1px solid #ead7b826;display:flex;gap:10px;flex-wrap:wrap}
#ringtip .rt-stat span{color:var(--saffron)}
.pnl.hl{border-color:var(--paper)!important;border-left-color:var(--blood)!important;box-shadow:0 0 25px #d92b1f44,9px 9px 0 #000;transition:all .4s}
.lrow.hl{background:#d92b1f22;border-radius:0;transition:background .3s}
.credit{font-size:.45rem;color:#715639;line-height:1.55;letter-spacing:.05em;margin-top:6px}
</style>
</head>
<body>
<div id="boot"><h1>SITRON</h1><div class="sub">Generative Raga Machine</div><div class="orb"></div><div class="hint">click anywhere to begin</div></div>
<canvas id="c"></canvas>
<div id="info"><div class="raag" id="rn"></div><div class="meta" id="rm"></div></div>
<div id="tel"></div>
<button id="tog">≡</button>
<div id="ui"></div>
<div id="ringtip"><div class="rt-name"><span class="rt-dot"></span><span class="rt-lbl"></span></div><div class="rt-desc"></div><div class="rt-stat"></div></div>
<script>
// ══════════════════════════════════════════════════════════════════
// SITRON v3 — Authentic Raga Synthesis
// Each instrument modeled from acoustic research.
// ══════════════════════════════════════════════════════════════════
const PI2=Math.PI*2, AC=new(window.AudioContext||window.webkitAudioContext)();
function mtof(m){return 440*Math.pow(2,(m-69)/12)}

// ── RAAGS ────────────────────────────────────────────────────────
const RAAGS={
  yaman:{name:'Yaman',thaat:'Kalyan',time:'Evening',
    intervals:[0,2,4,6,7,9,11],aroha:[0,2,4,6,7,9,11,12],avaroha:[12,11,9,7,6,4,2,0],
    vadi:4,samvadi:9,nyas:[0,4,7,9],
    pakad:[[9,11,12,11,9,7],[4,6,7,6,4,2,0],[11,9,7,6,4,2],[0,2,4,6,4]],
    gamakas:{4:'andolan',9:'andolan',11:'kan'}},
  bhairavi:{name:'Bhairavi',thaat:'Bhairavi',time:'Morning',
    intervals:[0,1,3,5,7,8,10],aroha:[0,1,3,5,7,8,10,12],avaroha:[12,10,8,7,5,3,1,0],
    vadi:3,samvadi:8,nyas:[0,3,5,8],
    pakad:[[3,1,0,-2,0],[5,3,1,0],[8,7,5,3,1],[10,8,7,5]],
    gamakas:{1:'andolan',3:'meend',8:'andolan'}},
  malkauns:{name:'Malkauns',thaat:'Bhairavi',time:'Late Night',
    intervals:[0,3,5,8,10],aroha:[0,3,5,8,10,12],avaroha:[12,10,8,5,3,0],
    vadi:5,samvadi:10,nyas:[0,3,5,8],
    pakad:[[5,3,0,-2,0],[8,5,3,5],[10,8,5,3,0],[0,3,5,8,5]],
    gamakas:{3:'andolan',8:'andolan',10:'meend'}},
  darbari:{name:'Darbari Kanada',thaat:'Asavari',time:'Late Night',
    intervals:[0,2,3,5,7,8,10],aroha:[0,2,3,5,7,8,10,12],avaroha:[12,10,8,7,5,3,2,0],
    vadi:2,samvadi:7,nyas:[0,2,5,7],
    pakad:[[2,0,-2,0],[7,8,7,5,3,2],[5,3,2,0,-2,0]],
    gamakas:{3:'andolan_slow',8:'andolan_slow'}},
  bhupali:{name:'Bhupali',thaat:'Kalyan',time:'Evening',
    intervals:[0,2,4,7,9],aroha:[0,2,4,7,9,12],avaroha:[12,9,7,4,2,0],
    vadi:4,samvadi:9,nyas:[0,4,7,9],
    pakad:[[4,2,0,-3,0],[7,4,2,4],[9,7,4,2,0],[0,2,4,7,9]],
    gamakas:{4:'meend',9:'andolan'}},
  shivranjani:{name:'Shivranjani',thaat:'Kafi',time:'Late Evening',
    intervals:[0,2,3,7,9],aroha:[0,2,3,7,9,12],avaroha:[12,9,7,3,2,0],
    vadi:7,samvadi:2,nyas:[0,3,7,9],
    pakad:[[7,9,7,3,2],[3,2,0,-3,0],[9,7,3,2,0],[0,2,3,7]],
    gamakas:{3:'meend',9:'andolan'}},
  bageshri:{name:'Bageshri',thaat:'Kafi',time:'Night',
    intervals:[0,2,3,5,7,9,10],aroha:[0,2,3,5,7,9,10,12],avaroha:[12,10,9,7,5,3,2,0],
    vadi:5,samvadi:10,nyas:[0,3,5,10],
    pakad:[[5,3,2,0,-2,0],[10,9,7,5,3],[5,7,9,7,5],[3,5,3,2,0]],
    gamakas:{3:'meend',10:'andolan'}},
};

// ── STATE ────────────────────────────────────────────────────────
const S={
  on:false, root:48, raag:'yaman', master:0.75, tempo:72,
  tanpura:{on:true,vol:0.8,tuning:'standard',speed:1.0},
  melody:{on:true,vol:0.5,density:0.5,octave:4,instrument:'esraj',form:'bandish',seed:1},
  drums:{on:true,vol:0.5,type:'kit',pattern:1},
  pad:{on:true,vol:0.18},
  bells:{on:true,vol:0.25},
  t0:0,fps:0
};

const TUNINGS={
  standard:r=>[{midi:r+7-12,name:'Pa♭'},{midi:r,name:'Sa'},{midi:r,name:'Sa'},{midi:r-12,name:'Sa♭'}],
  pancham:r=>[{midi:r+7,name:'Pa'},{midi:r,name:'Sa'},{midi:r,name:'Sa'},{midi:r-12,name:'Sa♭'}],
  madhyam:r=>[{midi:r+5,name:'Ma'},{midi:r,name:'Sa'},{midi:r,name:'Sa'},{midi:r-12,name:'Sa♭'}],
  kharaj:r=>[{midi:r+7-12,name:'Pa♭'},{midi:r-12,name:'Sa♭'},{midi:r,name:'Sa'},{midi:r-12,name:'Sa♭'}],
};

// ══════════════════════════════════════════════════════════════════
// TANPURA — Additive synthesis with jawari cascade envelope
// 4 strings × 12 harmonics = 48 persistent oscillators
// "Plucking" = rescheduling gain envelopes (oscillators never stop)
// ══════════════════════════════════════════════════════════════════
class TanpuraEngine {
  constructor(){
    this.master=AC.createGain();
    this.master.gain.value=0;

    // Body resonance filters (gourd formants)
    this.bodyFilters=[];
    const bodyFreqs=[180,350,520,750,1100];
    const bodyNode=AC.createGain();
    bodyNode.gain.value=0.8;
    bodyFreqs.forEach(f=>{
      const flt=AC.createBiquadFilter();
      flt.type='peaking'; flt.frequency.value=f; flt.Q.value=8; flt.gain.value=3;
      this.master.connect(flt); flt.connect(bodyNode);
      this.bodyFilters.push(flt);
    });
    // Also pass dry signal
    this.master.connect(bodyNode);

    // Reverb
    this.verb=AC.createConvolver();
    this.verbG=AC.createGain(); this.verbG.gain.value=0.4;
    this.dryG=AC.createGain(); this.dryG.gain.value=0.6;
    bodyNode.connect(this.dryG); this.dryG.connect(AC.destination);
    bodyNode.connect(this.verb); this.verb.connect(this.verbG); this.verbG.connect(AC.destination);
    this._makeVerb();

    // Stereo panners for string spread
    this.panners=[
      this._pan(-0.5), this._pan(-0.15), this._pan(0.15), this._pan(0.5)
    ];

    this.strings=[]; // [{harmonics:[{osc,gain}], panner, freq}]
    this.idx=0;
    this.timer=null;
    this.HARMONICS=12;
    this.DECAY=5.0;
    this.JAWARI=0.7;
    this.INHARMONICITY=0.00012;
    this.built=false;
  }

  _pan(v){const p=AC.createStereoPanner();p.pan.value=v;p.connect(this.master);return p}

  _makeVerb(){
    const sr=AC.sampleRate,len=sr*5,buf=AC.createBuffer(2,len,sr);
    for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++){const t=i/sr;
        const early=i<sr*0.06?Math.sin(i*0.008+ch)*0.4*Math.exp(-t*8):0;
        d[i]=(early+(Math.random()*2-1)*Math.exp(-t*1.4)*0.35)*0.4;
    }}
    this.verb.buffer=buf;
  }

  // Jawari cascade envelope — THE key to tanpura sound
  // Spectral energy sweeps UP through harmonics then falls back
  _jawariEnvelope(harmonicNum, elapsed){
    const n=harmonicNum, jawari=this.JAWARI;
    // Base amplitude: spectral tilt (more jawari = flatter = more highs)
    const alpha=0.4+(1-jawari)*0.5;
    const baseAmp=1/Math.pow(n,alpha);
    // Overall decay
    const decay=Math.exp(-elapsed/this.DECAY);
    if(jawari<0.05) return baseAmp*decay;
    // Sweeping spectral peak: peak harmonic goes from 1→~10, then falls
    const sweepDur=3.0;
    const tNorm=Math.min(elapsed/sweepDur,1.0);
    const peakH=1+(10*jawari)*tNorm*Math.exp(-tNorm*1.5);
    // Gaussian bell centered on sweeping peak
    const sigma=3+(1-jawari)*5;
    const boost=Math.exp(-Math.pow(n-peakH,2)/(2*sigma*sigma));
    return baseAmp*(0.3+0.7*boost)*decay;
  }

  // Build persistent oscillators for all 4 strings
  build(){
    const defs=TUNINGS[S.tanpura.tuning](S.root);
    this.strings=[];
    for(let si=0;si<4;si++){
      const freq=mtof(defs[si].midi);
      const harmonics=[];
      for(let h=1;h<=this.HARMONICS;h++){
        // Inharmonic frequency: f_n = n * f0 * sqrt(1 + B*n^2)
        const hFreq=h*freq*Math.sqrt(1+this.INHARMONICITY*h*h);
        // Slight per-oscillator detune for shimmer
        const detune=(Math.random()-0.5)*0.6;
        const osc=AC.createOscillator();
        osc.frequency.value=hFreq+detune;
        osc.type='sine';
        const gain=AC.createGain();
        gain.gain.value=0.001; // effectively silent until plucked
        osc.connect(gain);
        gain.connect(this.panners[si]);
        osc.start();
        harmonics.push({osc,gain,h});
      }
      this.strings.push({harmonics,freq,midi:defs[si].midi});
    }
    // Normalize: gain per string
    const norm=0.15/Math.sqrt(this.HARMONICS);
    this.strings.forEach(str=>str.norm=norm);
    this.built=true;
  }

  // "Pluck" = reschedule gain curves on existing oscillators
  pluck(strIdx){
    const str=this.strings[strIdx];
    const now=AC.currentTime;
    const attack=0.08;
    const totalTime=this.DECAY*1.2;
    const norm=str.norm;

    // Add subtle pluck noise (finger touching string)
    this._pluckNoise(str.freq, strIdx);

    for(const {gain,h} of str.harmonics){
      gain.gain.cancelScheduledValues(now);
      // Build 20-point jawari curve
      const curve=new Float32Array(20);
      for(let i=0;i<20;i++){
        const t=(i/19)*totalTime;
        curve[i]=this._jawariEnvelope(h,t)*norm;
      }
      gain.gain.setValueAtTime(0.001,now);
      gain.gain.linearRampToValueAtTime(curve[0],now+attack);
      gain.gain.setValueCurveAtTime(curve,now+attack,totalTime);
    }
  }

  _pluckNoise(freq,strIdx){
    const now=AC.currentTime;
    const len=Math.ceil(AC.sampleRate*0.05);
    const buf=AC.createBuffer(1,len,AC.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(len*0.15))*0.3;
    const src=AC.createBufferSource(); src.buffer=buf;
    const flt=AC.createBiquadFilter();
    flt.type='bandpass'; flt.frequency.value=freq*2; flt.Q.value=2;
    const g=AC.createGain();
    g.gain.setValueAtTime(0.06,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.05);
    src.connect(flt); flt.connect(g); g.connect(this.panners[strIdx]);
    src.start(now);
  }

  start(){
    if(!this.built) this.build();
    this.master.gain.setValueAtTime(0,AC.currentTime);
    this.master.gain.linearRampToValueAtTime(S.tanpura.vol*S.master,AC.currentTime+3);
    this.idx=0;
    this._schedule();
  }

  _schedule(){
    if(!S.on){this.timer=setTimeout(()=>this._schedule(),300);return}
    if(!S.tanpura.on){this.timer=setTimeout(()=>this._schedule(),300);return}

    this.pluck(this.idx);
    this.idx=(this.idx+1)%4;

    // Timing: ~1.8s between plucks (7.2s full cycle / 4 strings)
    // With humanization and kharaj pause
    const baseMs=1800/S.tanpura.speed;
    const humanize=(Math.random()-0.5)*100;
    const kharajPause=this.idx===0?300:0; // longer pause before cycle restart
    this.timer=setTimeout(()=>this._schedule(),baseMs+humanize+kharajPause);
  }

  stop(){clearTimeout(this.timer);this.master.gain.linearRampToValueAtTime(0,AC.currentTime+2)}

  retune(){
    if(!this.built)return;
    const defs=TUNINGS[S.tanpura.tuning](S.root);
    for(let si=0;si<4;si++){
      const freq=mtof(defs[si].midi);
      this.strings[si].freq=freq;
      this.strings[si].midi=defs[si].midi;
      for(let h=0;h<this.HARMONICS;h++){
        const hFreq=(h+1)*freq*Math.sqrt(1+this.INHARMONICITY*(h+1)*(h+1));
        this.strings[si].harmonics[h].osc.frequency.value=hFreq+(Math.random()-0.5)*0.6;
      }
    }
  }

  setVol(v){this.master.gain.linearRampToValueAtTime(v*S.master,AC.currentTime+0.5)}
}

// ══════════════════════════════════════════════════════════════════
// MELODY — FM synthesis with sitar character + gamakas
// Feedback filter zero at 0.01 (bright, not guitar-like)
// Sympathetic resonance halo
// ══════════════════════════════════════════════════════════════════
class MelodyEngine {
  constructor(){
    this.out=AC.createGain(); this.out.gain.value=0;
    this.out.connect(AC.destination);
    this.dly=AC.createDelay(2);this.dly.delayTime.value=0.35;

  }
  composeSong(){

    const rng=this._rng(this._hash(key)),m=this._motifs(R,rng),events=[],sections=[];
    const layouts={
      bandish:[['Alap Intro',12,'intro'],['Sthayi Long Line',24,'verse'],['Mukhda Return',12,'chorus'],['Antara Long Line',24,'antara'],['Sthayi Reprise',16,'verse'],['Taan Vistar',16,'taan'],['Final Mukhda',20,'chorus'],['Outro / Nyas',8,'outro']],
      bhajan:[['Invocation',8,'intro'],['Verse 1',16,'verse'],['Refrain',12,'chorus'],['Verse 2',16,'antara'],['Refrain Return',12,'chorus'],['Verse 3',16,'verse'],['Final Refrain',16,'chorus'],['Outro',8,'outro']],
      thumri:[['Bol Banao Intro',12,'intro'],['Sthayi Expansion',20,'verse'],['Refrain',12,'chorus'],['Antara Expansion',20,'antara'],['Bol Banao Bridge',12,'intro'],['Taan / Murki',12,'taan'],['Final Refrain',16,'chorus'],['Outro',8,'outro']],
      alapgat:[['Alap Vistar',20,'intro'],['Jor Development',20,'verse'],['Gat Theme',16,'chorus'],['Antara',24,'antara'],['Gat Return',16,'chorus'],['Jhala / Taan',20,'taan'],['Final Gat',16,'chorus'],['Outro',8,'outro']],

  _playEvent(ev,time,beatDur){

  _scheduleSong(){

  genPhrase(){
    const R=RAAGS[S.raag]; if(!R) return[0];
    const roll=Math.random();
    let notes=[];
    if(roll<0.35&&R.pakad.length>0){
      notes=[...R.pakad[Math.floor(Math.random()*R.pakad.length)]];
      if(Math.random()<0.4) notes.push(R.nyas[Math.floor(Math.random()*R.nyas.length)]);
    } else if(roll<0.55){
      const st=Math.floor(Math.random()*Math.max(1,R.aroha.length-3));
      const len=3+Math.floor(Math.random()*4);
      for(let i=st;i<Math.min(st+len,R.aroha.length);i++) notes.push(R.aroha[i]);
    } else if(roll<0.75){
      const st=Math.floor(Math.random()*Math.max(1,R.avaroha.length-3));
      const len=3+Math.floor(Math.random()*4);
      for(let i=st;i<Math.min(st+len,R.avaroha.length);i++) notes.push(R.avaroha[i]);
    } else {
      const len=3+Math.floor(Math.random()*5);
      let cur=R.nyas[Math.floor(Math.random()*R.nyas.length)];
      notes.push(cur);
      for(let i=1;i<len;i++){
        let best=R.intervals[0],bestW=-1;
        for(const n of R.intervals){
          let w=1;
          if(n===R.vadi)w+=4;if(n===R.samvadi)w+=3;
          if(R.nyas.includes(n))w+=2;
          const dist=Math.abs(n-(cur%12));
          if(dist<=2||dist>=10)w+=3;if(dist===0)w*=0.3;
          w*=(0.5+Math.random());
          if(w>bestW){bestW=w;best=n}
        }
        let note=best;
        if(cur>=12&&note<6)note+=12;
        if(Math.random()<0.1)note+=12;
        notes.push(note);cur=note;
      }
    }
    if(Math.random()<0.7&&R.nyas.length>0)
      notes.push(R.nyas[Math.floor(Math.random()*R.nyas.length)]);

  _playEsraj(midi,dur,gamaka,time,vel=1){

  _makeRoom(){
    const sr=AC.sampleRate,len=sr*0.6,buf=AC.createBuffer(2,len,sr);
    for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.exp(-(i/sr)*6)*0.25;}
    this.room.buffer=buf;
  }

  getPatterns(type=S.drums.type){return (this.banks[type]||this.banks.tabla).patterns}

  reset(){this.beat=0;this.nextTime=AC.currentTime+0.05;this._syncLegacy();this._stopSampleLoop(0.06)}

  _noise(filterType,filterFreq,filterQ,amp,decay,time){

    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    const src=AC.createBufferSource();src.buffer=buf;
    const flt=AC.createBiquadFilter();flt.type=filterType;flt.frequency.value=filterFreq;flt.Q.value=filterQ;
    const g=AC.createGain();

    g.gain.exponentialRampToValueAtTime(0.0001,time+decay);
    src.connect(flt);flt.connect(g);g.connect(this.out);src.start(time);src.stop(time+decay+0.02);

  _sweep(start,end,amp,decay,time,type='sine'){

    const g=AC.createGain();
    g.gain.setValueAtTime(Math.max(0.0001,amp),time);
    g.gain.exponentialRampToValueAtTime(0.0001,time+decay);

  }
  _modal(freqs,amps,decays,time){freqs.forEach((f,i)=>this._partial(f,amps[i],decays[i],time))}

  _isSampleBank(type=S.drums.type){return !!((this.banks[type]||{}).sample)}
  _norm(a,peak=0.92){
    let m=0;for(let i=0;i<a.length;i++)m=Math.max(m,Math.abs(a[i]));
    if(m>0){const s=peak/m;for(let i=0;i<a.length;i++)a[i]*=s}

  _makeSample(sec,fn){
    const sr=AC.sampleRate,a=new Float32Array(Math.ceil(sec*sr));

  _ensureSamples(){
    if(this.samples)return;
    const rnd=()=>Math.random()*2-1;
    let ph=0;const kick=this._makeSample(0.9,(t,i,sr)=>{
      const f=42+125*Math.exp(-t*25);ph+=PI2*f/sr;

    let slp=0;const snare=this._makeSample(0.55,(t)=>{
      const n=rnd();slp=slp*0.76+n*0.24;const hp=n-slp;
      const shell=(Math.sin(PI2*185*t)*0.42+Math.sin(PI2*335*t)*0.22)*Math.exp(-t*28);

    this._stopSampleLoop(0.04);
    const pats=this.getPatterns();
    const pat=pats[Math.min(S.drums.pattern,pats.length-1)]||pats[0];
    const seq=Array.isArray(pat.seq)?pat.seq:pat.seq.replace(/\|/g,'');
    const totalSteps=seq.length,beatDur=60/S.tempo,stepDur=beatDur/2;
    while(this.nextTime<AC.currentTime+0.12){
      if(S.drums.on&&S.on){
        const stepIdx=this.beat%totalSteps,step=seq[stepIdx],isSam=stepIdx===0||stepIdx%8===0;
        const vel=(isSam?0.82:0.56)+(Math.random()*0.12);
        if(S.drums.type==='handpan'){
          if(step!=='.'&&step!==undefined&&Math.random()<(isSam?0.98:0.88))this._playHandpan(step,this.nextTime,vel);
        } else if(step!=='.'&&Math.random()<(isSam?0.98:0.84)) this._playBol(step,this.nextTime,vel);
      }
      this.beat++;this.nextTime+=stepDur;
    }
  }

  start(){
    this.out.gain.setValueAtTime(0,AC.currentTime);
    this.out.gain.linearRampToValueAtTime(S.drums.vol*S.master,AC.currentTime+5);
    this.gridStart=AC.currentTime+3;this.reset();this.nextTime=this.gridStart;
    this.scheduler=setInterval(()=>this.schedule(),40);
  }
  stop(){clearInterval(this.scheduler);this._stopSampleLoop(0.25);this.out.gain.linearRampToValueAtTime(0,AC.currentTime+1)}
  setVol(v){this.out.gain.linearRampToValueAtTime(v*S.master,AC.currentTime+0.3)}
}

// ══════════════════════════════════════════════════════════════════
// PAD — warm detuned drone
// ══════════════════════════════════════════════════════════════════
class PadEngine {
  constructor(){
    this.out=AC.createGain();this.out.gain.value=0;
    this.flt=AC.createBiquadFilter();this.flt.type='lowpass';this.flt.frequency.value=500;this.flt.Q.value=0.7;
    this.out.connect(this.flt);this.flt.connect(AC.destination);
    this.oscs=[];
  }
  start(){
    const t=AC.currentTime,sa=mtof(S.root),pa=mtof(S.root+7),saH=mtof(S.root+12);
    [[sa*0.999,'sine',0.04],[sa*1.001,'sine',0.04],[pa*0.998,'sine',0.03],
     [pa*1.002,'sine',0.03],[saH*0.999,'sine',0.02],[saH*1.001,'triangle',0.012]
    ].forEach(([f,type,vol],i)=>{
      const o=AC.createOscillator();o.frequency.value=f;o.type=type;
      const g=AC.createGain();g.gain.value=vol;
      const lfo=AC.createOscillator();lfo.frequency.value=0.03+i*0.012;lfo.type='sine';
      const lg=AC.createGain();lg.gain.value=vol*0.35;
      lfo.connect(lg);lg.connect(g.gain);
      o.connect(g);g.connect(this.out);o.start(t);lfo.start(t);
      this.oscs.push({o,g,lfo,lg});
    });
    this.out.gain.setValueAtTime(0,t);
    this.out.gain.linearRampToValueAtTime(S.pad.vol*S.master,t+8);
  }
  stop(){
    this.out.gain.linearRampToValueAtTime(0,AC.currentTime+3);
    setTimeout(()=>{this.oscs.forEach(x=>{try{x.o.stop();x.lfo.stop()}catch(e){}});this.oscs=[]},4000);
  }
  setVol(v){this.out.gain.linearRampToValueAtTime(v*S.master,AC.currentTime+1)}
}

// ══════════════════════════════════════════════════════════════════
// BELLS — sparse inharmonic partials
// ══════════════════════════════════════════════════════════════════
class BellsEngine {
  constructor(){
    this.out=AC.createGain();this.out.gain.value=0;
    this.verb=AC.createConvolver();
    const sr=AC.sampleRate,len=sr*4,buf=AC.createBuffer(2,len,sr);
    for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.exp(-(i/sr)*1.2)*0.2}
    this.verb.buffer=buf;
    this.vG=AC.createGain();this.vG.gain.value=0.45;
    this.out.connect(this.verb);this.verb.connect(this.vG);this.vG.connect(AC.destination);
    this.out.connect(AC.destination);
  }
  ring(midi){
    if(!S.bells.on||!S.on)return;
    const t=AC.currentTime,f=mtof(midi);
    [1,2.2,3.6,5.1,6.8,8.5].forEach((r,i)=>{
      const dec=[3.5,2.5,2,1.5,1,0.7][i];
      const o=AC.createOscillator();o.frequency.value=f*r*(1+(Math.random()-0.5)*0.004);o.type='sine';
      const g=AC.createGain();g.gain.setValueAtTime(0.08/(i+1),t);g.gain.exponentialRampToValueAtTime(0.0001,t+dec);
      o.connect(g);g.connect(this.out);o.start(t);o.stop(t+dec+0.1);
    });
  }
  trigger(){
    const R=RAAGS[S.raag];if(!R)return;
    const n=R.intervals[Math.floor(Math.random()*R.intervals.length)];
    this.ring(S.root+24+n);
  }
  start(){this.out.gain.setValueAtTime(0,AC.currentTime);this.out.gain.linearRampToValueAtTime(S.bells.vol*S.master,AC.currentTime+2)}
  stop(){this.out.gain.linearRampToValueAtTime(0,AC.currentTime+1)}
  setVol(v){this.out.gain.linearRampToValueAtTime(v*S.master,AC.currentTime+0.3)}
}

// ══════════════════════════════════════════════════════════════════
// VISUAL ENGINE — Symbol-based sacred geometry

class Vis {

      ['╋','┼','✦','✧','⊹','⁕'],
      ['◆','◇','▣','▢','⬡','⬢'],
      ['░','▒','▓','≡','≣','⫶'],
      ['·','∘','∙','⁘','⁙','⁚'],
      ['△','▽','▲','▼','◁','▷'],
    ];
    this.rings=[
      {r:0.12,spd:0.06,n:24,si:0,col:'#e8851e',lbl:'Sa',track:'tanpura'},
      {r:0.20,spd:-0.04,n:32,si:1,col:'#c9a84c',lbl:'Aroha',track:'melody'},
      {r:0.28,spd:0.09,n:20,si:2,col:'#d44a1a',lbl:'Taal',track:'tabla'},
      {r:0.36,spd:-0.07,n:28,si:3,col:'#8b5cf6',lbl:'Swar',track:'bells'},
      {r:0.44,spd:0.03,n:36,si:4,col:'#2a9d8f',lbl:'Laya',track:'pad'},
      {r:0.52,spd:-0.05,n:16,si:5,col:'#b8432a',lbl:'Nada',track:'tanpura'},
      {r:0.60,spd:0.02,n:40,si:6,col:'#7c6930',lbl:'Aum',track:'pad'},
    ];
    // Ring detail descriptions
    this.ringInfo=[
      {name:'Tanpura · Sa',desc:'Persistent drone — 48 sine oscillators with jawari cascade envelope. Spectral sweep creates the shimmering characteristic.',stats:()=>`Tuning: <span>${S.tanpura.tuning}</span> Speed: <span>${S.tanpura.speed.toFixed(1)}x</span>`},
      {name:'Melody · Song',desc:'Structured raga composition using real acoustic sample playback when loaded, with synthesis only as fallback.',stats:()=>`Section: <span>${melody?melody.currentSection:''}</span> Samples: <span>${melody?melody.sampleStatus:''}</span>`},
      {name:'Drums · Rhythm',desc:'Coherent rhythm layer. Western kit tracks are rendered as acoustic audio loops; Indian and world drums remain selectable.',stats:()=>`Track: <span>${tabla?tabla.patterns[tabla.current].name:''}</span> BPM: <span>${S.tempo}</span>`},
      {name:'Bells · Chimera',desc:'Sparse inharmonic partials (×2.2, ×3.6, ×5.1). Long reverb tail. Triggered at natural intervals from the raag scale.',stats:()=>`Vol: <span>${(S.bells.vol*100|0)}%</span> Active: <span>${S.bells.on?'Yes':'No'}</span>`},
      {name:'Drone Pad',desc:'Detuned oscillators on Sa, Pa, Sa♯. Ultra-slow LFO modulation creates a breathing background warmth.',stats:()=>`Vol: <span>${(S.pad.vol*100|0)}%</span> Root: <span>${['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'][S.root%12]}</span>`},
      {name:'Tanpura · Resonance',desc:'Body resonance harmonics — peaking filters at 180, 350, 520, 750, 1100 Hz shape the gourd cavity character.',stats:()=>`Jawari: <span>70%</span> Decay: <span>5.0s</span>`},
      {name:'Ambient · Aum',desc:'The outermost field — particles rise from the collective vibration. All layers merge into the cosmic drone.',stats:()=>`Layers: <span>5</span> Master: <span>${(S.master*100|0)}%</span>`},
    ];
    // Mouse tracking
    this.mx=0;this.my=0;
    cv.addEventListener('mousemove',e=>{this.mx=e.clientX;this.my=e.clientY;this._detectHover()});
    cv.addEventListener('mouseleave',()=>{this._setHover(-1)});
  }
  resize(){
    this.w=window.innerWidth;this.h=window.innerHeight;
    this.cv.width=this.w*this.dpr;this.cv.height=this.h*this.dpr;
    this.cv.style.width=this.w+'px';this.cv.style.height=this.h+'px';
    this.c.setTransform(this.dpr,0,0,this.dpr,0,0);
    this.cx=this.w/2;this.cy=this.h/2;this.dim=Math.min(this.w,this.h);
  }

  _detectHover(){
    const dx=this.mx-this.cx, dy=this.my-this.cy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const dim=this.dim;
    let closest=-1, closestDist=Infinity;
    for(let i=0;i<this.rings.length;i++){
      const ringR=this.rings[i].r*dim*0.48;
      const d=Math.abs(dist-ringR);
      if(d<dim*0.028 && d<closestDist){ closestDist=d; closest=i; }
    }
    this._setHover(closest);
  }

  _setHover(ri){
    if(ri===this.hoverRing) return;
    const prev=this.hoverRing;
    this.hoverRing=ri;
    const tip=document.getElementById('ringtip');
    // Remove panel highlights
    document.querySelectorAll('.pnl.hl,.lrow.hl').forEach(el=>el.classList.remove('hl'));
    if(ri<0){
      tip.classList.remove('show');
      return;
    }
    // Position tooltip near mouse but offset
    const info=this.ringInfo[ri];
    tip.querySelector('.rt-dot').style.background=this.rings[ri].col;
    tip.querySelector('.rt-lbl').textContent=info.name;
    tip.querySelector('.rt-desc').textContent=info.desc;
    tip.querySelector('.rt-stat').innerHTML=info.stats();
    // Position: to the side of center, avoiding overlap
    const angle=Math.atan2(this.my-this.cy,this.mx-this.cx);
    const tipX=this.mx+(angle>-Math.PI/2&&angle<Math.PI/2?20:-280);
    const tipY=Math.max(20,Math.min(this.h-140,this.my-40));
    tip.style.left=tipX+'px';tip.style.top=tipY+'px';
    tip.classList.add('show');
    // Highlight corresponding panel & open UI
    const track=this.rings[ri].track;
    this._highlightPanel(track);
  }

  _highlightPanel(track){
    const ui=document.getElementById('ui');
    // Highlight the layer row
    const lrow=ui.querySelector(`.lrow[data-track="${track}"]`);
    if(lrow) lrow.classList.add('hl');
    // Highlight the specific controls panel
    const pnl=ui.querySelector(`.pnl[data-pnl="${track}"]`);
    if(pnl){
      pnl.classList.add('hl');
      ui.classList.add('open');
      pnl.scrollIntoView({behavior:'smooth',block:'nearest'});
    } else {
      // For tracks without dedicated panel, highlight layers panel
      ui.classList.add('open');
      const layersPnl=ui.querySelector('.pnl[data-pnl="layers"]');
      if(layersPnl){layersPnl.classList.add('hl');layersPnl.scrollIntoView({behavior:'smooth',block:'nearest'})}
    }
  }

  flash(ri,a){this.flashes.push({ring:ri,angle:a,life:1})}
  pulse(){this.beatPulse=1}

  render(time){
    const c=this.c,cx=this.cx,cy=this.cy,dim=this.dim;
    // Decay hover animation when no ring hovered
    if(this.hoverRing<0&&this.hoverAnim>0) this.hoverAnim=Math.max(0,this.hoverAnim-0.06);
    this._drawCinemaBackdrop(c,cx,cy,dim,time);
    this._drawInkLandscape(c,cx,cy,dim,time);
    this._drawStoryFilm(c,cx,cy,dim,time);
    this._drawPanelCuts(c,cx,cy,dim,time);
    // Center sigil
    const br=0.5+Math.sin(time*0.4)*0.3+this.beatPulse*0.3;
    const cg=c.createRadialGradient(cx,cy,0,cx,cy,dim*0.05);
    cg.addColorStop(0,`rgba(217,43,31,${0.17+br*0.08})`);cg.addColorStop(.5,`rgba(242,228,199,${0.05+br*0.04})`);cg.addColorStop(1,'transparent');
    c.fillStyle=cg;c.beginPath();c.arc(cx,cy,dim*0.075,0,PI2);c.fill();
    c.beginPath();c.arc(cx,cy,2+br*2,0,PI2);
    c.fillStyle=`rgba(242,228,199,${0.6+br*0.3})`;c.fill();
    // OM at center
    c.font=`900 ${18+br*7}px serif`;c.textAlign='center';c.textBaseline='middle';
    c.fillStyle=`rgba(242,228,199,${0.12+br*0.08})`;c.fillText('ॐ',cx,cy);

    // Symbol rings
    for(let ri=0;ri<this.rings.length;ri++) this._drawRing(c,cx,cy,dim,time,ri);
    // Connections
    this._drawConns(c,cx,cy,dim,time);
    // Flashes
    for(let i=this.flashes.length-1;i>=0;i--){
      const f=this.flashes[i];f.life-=0.015;
      if(f.life<=0){this.flashes.splice(i,1);continue}
      const rc=this.rings[f.ring];if(!rc)continue;
      const r=rc.r*dim*0.48,fx=cx+Math.cos(f.angle)*r,fy=cy+Math.sin(f.angle)*r;
      const sz=(1-f.life)*40+8;
      const fg=c.createRadialGradient(fx,fy,0,fx,fy,sz);
      fg.addColorStop(0,rc.col+Math.floor(f.life*180).toString(16).padStart(2,'0'));
      fg.addColorStop(1,'transparent');
      c.fillStyle=fg;c.beginPath();c.arc(fx,fy,sz,0,PI2);c.fill();
    }
    // Particles
    this._particles(c,cx,cy,dim,time);
    this._drawFilmGrain(c,time);
    this.beatPulse*=0.92;
  }

  _drawCinemaBackdrop(c,cx,cy,dim,time){
    const bg=c.createRadialGradient(cx,cy,0,cx,cy,dim*0.9);
    bg.addColorStop(0,'#160f09');bg.addColorStop(.36,'#070504');bg.addColorStop(.72,'#020201');bg.addColorStop(1,'#000');
    c.fillStyle=bg;c.fillRect(0,0,this.w,this.h);
    c.save();
    c.globalAlpha=.9;
    c.fillStyle='#0b0705';
    for(let i=0;i<9;i++){
      const x=(i/8)*this.w+Math.sin(time*.2+i)*18,base=this.h*(.68+.04*Math.sin(i));
      c.beginPath();c.moveTo(x-80,this.h);c.lineTo(x-30,base);c.lineTo(x+20,base+35);c.lineTo(x+80,this.h);c.fill();
    }
    const slash=c.createLinearGradient(0,0,this.w,this.h);
    slash.addColorStop(0,'rgba(0,0,0,0)');slash.addColorStop(.42,'rgba(217,43,31,.0)');slash.addColorStop(.48,'rgba(217,43,31,.55)');slash.addColorStop(.53,'rgba(242,228,199,.14)');slash.addColorStop(.58,'rgba(0,0,0,0)');
    c.fillStyle=slash;c.fillRect(0,0,this.w,this.h);
    c.globalAlpha=.18;c.fillStyle='#ead7b8';
    for(let y=0;y<this.h;y+=7){c.fillRect(0,y,this.w,1)}
    c.restore();
  }

  _drawPanelCuts(c,cx,cy,dim,time){
    c.save();c.lineWidth=2;c.strokeStyle='rgba(234,215,184,.16)';
    this.panels.forEach((p,i)=>{
      const x=cx+p[0]*dim+Math.sin(time*.15+i)*4,y=cy+p[1]*dim,w=p[2]*dim,h=p[3]*dim;
      c.save();c.translate(x,y);c.rotate((i-1)*-.04);
      c.strokeRect(0,0,w,h);
      c.fillStyle=i===1?'rgba(217,43,31,.055)':'rgba(234,215,184,.025)';
      c.fillRect(0,0,w,h);
      c.restore();
    });
    c.restore();
  }

  _drawInkLandscape(c,cx,cy,dim,time){
    c.save();
    const sunR=dim*.115*(1+this.beatPulse*.08);
    c.beginPath();c.arc(cx+dim*.26,cy-dim*.24,sunR,0,PI2);
    c.fillStyle='rgba(217,43,31,.82)';c.fill();
    c.globalCompositeOperation='destination-out';
    for(let y=-sunR;y<sunR;y+=sunR*.28){c.fillRect(cx+dim*.26-sunR,cy-dim*.24+y,sunR*2,sunR*.05)}
    c.globalCompositeOperation='source-over';
    c.lineCap='round';c.lineJoin='round';
    for(let k=0;k<4;k++){
      c.beginPath();
      const y0=cy+dim*(.18+k*.055);
      c.moveTo(-20,y0);
      for(let x=-20;x<this.w+40;x+=dim*.045){
        const y=y0+Math.sin(x*.006+k*1.7+time*.08)*dim*.025+Math.sin(x*.017+k)*dim*.01;
        c.lineTo(x,y);
      }
      c.strokeStyle=`rgba(0,0,0,${.62-k*.08})`;c.lineWidth=dim*(.035-k*.004);c.stroke();
    }
    this.inkDrops.forEach(d=>{
      const a=d.a+time*d.sp*.12,r=d.r*dim;
      const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
      c.beginPath();c.arc(x,y,d.sz*(1+this.beatPulse),0,PI2);
      c.fillStyle=d.sz>2?'rgba(217,43,31,.22)':'rgba(234,215,184,.18)';c.fill();
    });
    c.restore();
  }

  _storyScene(time){
    let t=((time%this.storyTotal)+this.storyTotal)%this.storyTotal,acc=0,idx=0;
    for(let i=0;i<this.story.length;i++){if(t<acc+this.story[i].dur){idx=i;break}acc+=this.story[i].dur}
    let local=t-acc,scene=this.story[idx];
    if(local>scene.dur-1.2){
      const alt=(idx+1+Math.floor((local-(scene.dur-1.2))*8))%this.story.length;
      scene=this.story[alt];local=(local*1.7)%scene.dur;
    }
    return{scene,local,idx};
  }

  _drawStoryFilm(c,cx,cy,dim,time){
    const {scene,local,idx}=this._storyScene(time);
    const cutFlash=Math.max(0,1-((local%scene.dur)/0.22));
    const shake=(this.beatPulse*4+cutFlash*7);
    c.save();
    c.translate(Math.sin(time*41.3)*shake,Math.cos(time*37.1)*shake*.55);
    c.globalAlpha=.72;
    if(scene.kind==='alley')this._sceneAlley(c,cx,cy,dim,local);
    else if(scene.kind==='run')this._sceneRun(c,cx,cy,dim,local);
    else if(scene.kind==='train')this._sceneTrain(c,cx,cy,dim,local);
    else if(scene.kind==='surveil')this._sceneSurveil(c,cx,cy,dim,local);
    else if(scene.kind==='crowd')this._sceneCrowd(c,cx,cy,dim,local);
    else if(scene.kind==='tower')this._sceneTower(c,cx,cy,dim,local);
    else if(scene.kind==='temple')this._sceneTemple(c,cx,cy,dim,local);
    else this._sceneArchive(c,cx,cy,dim,local);
    c.restore();
    this._drawStoryCaption(c,scene,idx,local,time);
  }

  _runner(c,x,y,s,t,flip=1){
    const p=Math.sin(t*9),q=Math.cos(t*9);
    c.save();c.translate(x,y);c.scale(flip,1);c.strokeStyle='#020201';c.fillStyle='#020201';c.lineCap='round';c.lineWidth=s*.12;
    c.beginPath();c.arc(0,-s*.92,s*.16,0,PI2);c.fill();
    c.beginPath();c.moveTo(0,-s*.72);c.lineTo(s*.06,-s*.28);c.stroke();
    c.beginPath();c.moveTo(s*.02,-s*.58);c.lineTo(s*(.38*p),-s*.42);c.moveTo(s*.02,-s*.5);c.lineTo(-s*(.35*p),-s*.36);c.stroke();
    c.beginPath();c.moveTo(s*.05,-s*.28);c.lineTo(s*(.32*q),s*.06);c.moveTo(s*.05,-s*.28);c.lineTo(-s*(.34*q),s*.1);c.stroke();
    c.restore();
  }

  _sceneAlley(c,cx,cy,dim,t){
    const y=cy+dim*.23,van=cy-dim*.08;
    c.fillStyle='rgba(0,0,0,.45)';c.fillRect(0,0,this.w,this.h);
    c.strokeStyle='rgba(234,215,184,.20)';c.lineWidth=2;
    for(let i=-6;i<8;i++){const x=cx+i*dim*.12;c.beginPath();c.moveTo(x,y);c.lineTo(cx+i*dim*.025,van);c.stroke()}
    for(let i=0;i<7;i++){const yy=y-i*dim*.07;c.beginPath();c.moveTo(0,yy);c.lineTo(this.w,yy-dim*.025);c.stroke()}
    c.fillStyle='rgba(217,43,31,.20)';for(let i=0;i<8;i++)c.fillRect((i*.17*this.w+t*34)%this.w,cy-dim*.22+(i%3)*dim*.09,dim*.035,dim*.018);
    this._runner(c,(t*.18%1)*this.w,y-dim*.03,dim*.09,t,1);
  }

  _sceneRun(c,cx,cy,dim,t){
    c.fillStyle='rgba(234,215,184,.05)';c.fillRect(0,cy+dim*.21,this.w,dim*.035);
    for(let i=0;i<9;i++){
      const x=((i*.19-t*.22)%1+1)%1*this.w;
      c.fillStyle=i%3?'rgba(0,0,0,.72)':'rgba(217,43,31,.28)';
      c.fillRect(x,cy-dim*.22,dim*.055,dim*.44);
    }
    this._runner(c,cx-dim*.08,cy+dim*.24,dim*.15,t,1);
    this._runner(c,cx+dim*.18,cy+dim*.26,dim*.10,t+.4,-1);
    c.fillStyle='rgba(217,43,31,.35)';c.fillRect(cx-dim*.35,cy-dim*.31,dim*.7,dim*.012);
  }

  _sceneTrain(c,cx,cy,dim,t){
    const x=((-t*.28)%1)*this.w;
    c.fillStyle='rgba(0,0,0,.68)';c.fillRect(0,cy-dim*.16,this.w,dim*.3);
    c.fillStyle='rgba(234,215,184,.11)';
    for(let k=0;k<3;k++){const ox=x+k*this.w*.9;for(let i=0;i<11;i++)c.fillRect(ox+i*dim*.08,cy-dim*.1,dim*.045,dim*.06)}
    c.fillStyle='rgba(217,43,31,.45)';c.fillRect(0,cy+dim*.13,this.w,dim*.018);
    for(let i=0;i<14;i++){const px=(i*.09*this.w+t*220)%this.w;c.fillStyle='rgba(234,215,184,.08)';c.fillRect(px,cy+dim*.18,dim*.04,2)}
  }

  _sceneSurveil(c,cx,cy,dim,t){
    c.fillStyle='rgba(0,0,0,.52)';c.fillRect(0,0,this.w,this.h);
    c.strokeStyle='rgba(234,215,184,.25)';c.lineWidth=dim*.008;
    c.beginPath();c.ellipse(cx,cy,dim*.28,dim*.13,0,0,PI2);c.stroke();
    c.beginPath();c.arc(cx,cy,dim*.05*(1+this.beatPulse*.4),0,PI2);c.fillStyle='rgba(217,43,31,.75)';c.fill();
    c.strokeStyle='rgba(217,43,31,.35)';c.lineWidth=2;const sy=cy-dim*.16+(t%2)*dim*.16;c.beginPath();c.moveTo(cx-dim*.34,sy);c.lineTo(cx+dim*.34,sy);c.stroke();
    for(let i=0;i<16;i++){c.fillStyle='rgba(234,215,184,.10)';c.fillText('CAM '+String(i).padStart(2,'0'),(i%4)*this.w*.24+20,Math.floor(i/4)*dim*.08+cy+dim*.18)}
  }

  _sceneCrowd(c,cx,cy,dim,t){
    const base=cy+dim*.26;c.fillStyle='rgba(0,0,0,.35)';c.fillRect(0,base,this.w,this.h-base);
    for(let i=0;i<42;i++){
      const x=((i*.071+t*.025)%1)*this.w,y=base-dim*(.02+(i%7)*.018),s=dim*(.035+(i%5)*.006);
      c.fillStyle=i%11?'rgba(0,0,0,.70)':'rgba(217,43,31,.45)';
      c.beginPath();c.arc(x,y-s*.5,s*.16,0,PI2);c.fill();c.fillRect(x-s*.12,y-s*.35,s*.24,s*.6);
    }
    c.fillStyle='rgba(234,215,184,.10)';c.fillRect(0,base-dim*.03,this.w,1);
  }

  _sceneTower(c,cx,cy,dim,t){
    c.strokeStyle='rgba(0,0,0,.85)';c.lineWidth=dim*.012;c.beginPath();c.moveTo(cx,cy+dim*.28);c.lineTo(cx-dim*.08,cy-dim*.28);c.lineTo(cx+dim*.08,cy-dim*.28);c.lineTo(cx,cy+dim*.28);c.stroke();
    c.strokeStyle='rgba(217,43,31,.40)';c.lineWidth=2;
    for(let i=0;i<5;i++){c.beginPath();c.arc(cx,cy-dim*.28,dim*(.09+i*.055+Math.sin(t*2+i)*.005),Math.PI*1.15,Math.PI*1.85);c.stroke()}
    c.fillStyle='rgba(234,215,184,.08)';for(let i=0;i<30;i++)c.fillRect((Math.sin(i*12.9+t)*.5+.5)*this.w,(i*.037*this.h+t*18)%this.h,dim*.035,1);
  }

  _sceneTemple(c,cx,cy,dim,t){
    const base=cy+dim*.24;c.fillStyle='rgba(0,0,0,.76)';
    c.fillRect(cx-dim*.22,base-dim*.16,dim*.44,dim*.16);
    for(let i=0;i<5;i++)c.fillRect(cx-dim*.18+i*dim*.09,base-dim*.28,dim*.035,dim*.28);
    c.beginPath();c.moveTo(cx-dim*.27,base-dim*.28);c.lineTo(cx,base-dim*.44);c.lineTo(cx+dim*.27,base-dim*.28);c.fill();
    c.fillStyle='rgba(217,43,31,.25)';c.fillRect(cx-dim*.26,base-dim*.18,dim*.52,dim*.025);
    for(let i=0;i<10;i++){c.fillStyle='rgba(234,215,184,.12)';c.fillRect((i*.13*this.w+t*12)%this.w,base+Math.sin(i+t)*8,dim*.025,dim*.01)}
  }

  _sceneArchive(c,cx,cy,dim,t){
    c.fillStyle='rgba(0,0,0,.40)';c.fillRect(0,0,this.w,this.h);
    for(let i=0;i<18;i++){
      const x=((i*.137+Math.sin(t*.2+i)*.02)%1)*this.w,y=((i*.071+t*.035)%1)*this.h;
      c.save();c.translate(x,y);c.rotate(Math.sin(i+t)*.18);c.strokeStyle='rgba(234,215,184,.18)';c.strokeRect(-dim*.035,-dim*.045,dim*.07,dim*.09);
      c.fillStyle=i%4?'rgba(234,215,184,.08)':'rgba(217,43,31,.18)';c.fillRect(-dim*.03,-dim*.035,dim*.06,dim*.01);c.fillRect(-dim*.03,-dim*.015,dim*.045,dim*.006);c.restore();
    }
    c.font=`${Math.max(9,dim*.018)}px monospace`;c.fillStyle='rgba(217,43,31,.24)';c.fillText('REEL 04 / MEMORY CORRUPTED',cx-dim*.23,cy+dim*.28);
  }

  _drawStoryCaption(c,scene,idx,local,time){
    const cut=local<.6?local/.6:1,fade=Math.min(cut,Math.max(0,(scene.dur-local)/.8));
    c.save();c.globalAlpha=.75*fade;
    c.fillStyle='rgba(0,0,0,.72)';c.fillRect(this.w*.12,this.h*.78,this.w*.58,34);
    c.fillStyle=idx%3===0?'#d92b1f':'#ead7b8';c.font=`700 ${Math.max(10,this.dim*.015)}px monospace`;c.textAlign='left';c.textBaseline='middle';
    c.fillText(scene.cap,this.w*.14,this.h*.78+17);
    c.fillStyle='rgba(234,215,184,.22)';c.fillText(`SHOT ${String(idx+1).padStart(2,'0')} / ${melody?melody.currentSection:'OPENING'}`,this.w*.14,this.h*.78+39);
    c.restore();
  }

  _drawFilmGrain(c,time){
    c.save();c.globalAlpha=.08;c.fillStyle='#fff';
    for(let i=0;i<90;i++){
      const x=(Math.sin(i*91.7+time*23.1)*.5+.5)*this.w;
      const y=(Math.sin(i*37.1+time*31.3)*.5+.5)*this.h;
      c.fillRect(x,y,1+(i%3),1);
    }
    c.restore();
  }

  _drawRing(c,cx,cy,dim,time,ri){
    const cfg=this.rings[ri];
    const isHover=ri===this.hoverRing;
    // Smooth animation for explode
    if(isHover&&this.hoverAnim<1) this.hoverAnim=Math.min(1,this.hoverAnim+0.06);
    if(!isHover&&this.hoverAnim>0&&this._lastHover===ri) this.hoverAnim=Math.max(0,this.hoverAnim-0.08);
    if(isHover) this._lastHover=ri;
    const explode=isHover?this.hoverAnim:(this._lastHover===ri?this.hoverAnim:0);
    // Explode: expand radius, increase size, brighten
    const rBase=cfg.r*dim*0.48;
    const rExpand=rBase*(1+explode*0.08);
    const r=rExpand;
    const rot=time*cfg.spd;
    const syms=this.syms[cfg.si];
    // Brush-stroke orbit — imperfect, heavy, cinematic
    c.save();c.lineCap='round';c.lineJoin='round';
    for(let s=0;s<3;s++){
      c.beginPath();
      const segs=84,off=s*.037;
      for(let j=0;j<=segs;j++){
        const a=rot+off+(j/segs)*PI2;
        const wob=Math.sin(j*.7+ri*2.1+time*.9)*dim*.0025+Math.sin(j*1.9+ri)*dim*.0015;
        const rr=r+wob+s*1.7;
        const x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;
        if(j===0)c.moveTo(x,y);else c.lineTo(x,y);
      }
      c.strokeStyle=s===0?'rgba(0,0,0,.58)':(s===1?cfg.col+Math.floor((isHover?0.55:0.2)*255).toString(16).padStart(2,'0'):'rgba(234,215,184,.10)');
      c.lineWidth=(isHover?5:2.5)+s*1.2+explode*5;c.stroke();
    }
    c.restore();
    // Ring circle — brighter when hovered
    c.beginPath();c.arc(cx,cy,r,0,PI2);
    c.strokeStyle=isHover?'rgba(242,228,199,.58)':cfg.col+'1d';c.lineWidth=isHover?1.6:0.45;c.stroke();
    // Glow ring on hover
    if(explode>0.1){
      c.beginPath();c.arc(cx,cy,r,0,PI2);
      c.strokeStyle=cfg.col+Math.floor(explode*40).toString(16).padStart(2,'0');
      c.lineWidth=4*explode;c.stroke();
      // Label on the ring
      c.font=`${9+explode*3}px monospace`;c.textAlign='center';c.textBaseline='middle';
      c.fillStyle='rgba(242,228,199,'+(.35+explode*.45)+')';
      c.fillText(cfg.lbl,cx,cy-r-12*explode);
    }
    // Symbols — bigger and brighter on hover
    const fontSize=Math.max(8,dim*0.011)*(1+explode*0.5);
    c.font=`${fontSize}px monospace`;c.textAlign='center';c.textBaseline='middle';
    // On hover, spread symbols slightly outward
    for(let i=0;i<cfg.n;i++){
      const a=rot+(i/cfg.n)*PI2;
      const spreadR=r+(explode*dim*0.012*Math.sin(i*1.7+time*2));
      const x=cx+Math.cos(a)*spreadR,y=cy+Math.sin(a)*spreadR;
      const symIdx=(i+Math.floor(time*0.3+i*0.5))%syms.length;
      const pulse=0.3+Math.sin(time*1.5+i*0.7+ri*2)*0.2;
      const na=((a%PI2)+PI2)%PI2;
      const dt=Math.abs(na-Math.PI*1.5);
      const tg=dt<0.3?(0.3-dt)*2:0;
      const alpha=Math.min(1,pulse+tg+this.beatPulse*0.15+explode*0.5);
      if(isHover&&i%5===0){
        c.save();c.translate(x,y);c.rotate(a+Math.PI/2);c.fillStyle='rgba(217,43,31,.55)';c.fillRect(-fontSize*.08,-fontSize*.9,fontSize*.16,fontSize*1.8);c.restore();
      }
      c.fillStyle=(isHover&&i%3===0)?`rgba(242,228,199,${alpha})`:cfg.col+Math.floor(alpha*230).toString(16).padStart(2,'0');
      c.fillText(syms[symIdx],x,y);
    }
  }

  _drawConns(c,cx,cy,dim,time){
    c.lineWidth=1.1;
    [[0,2],[1,3],[2,4],[3,5],[4,6]].forEach(([a,b])=>{
      const ra=this.rings[a],rb=this.rings[b];
      const aa=time*ra.spd,ab=time*rb.spd;
      const diff=Math.abs(((aa-ab)%PI2+PI2)%PI2);
      if(diff<0.2||diff>PI2-0.2){
        const rA=ra.r*dim*0.48,rB=rb.r*dim*0.48,avg=(aa+ab)/2;
        const x1=cx+Math.cos(avg)*rA,y1=cy+Math.sin(avg)*rA;
        const x2=cx+Math.cos(avg)*rB,y2=cy+Math.sin(avg)*rB;
        const g=c.createLinearGradient(x1,y1,x2,y2);
        g.addColorStop(0,'rgba(242,228,199,.38)');g.addColorStop(.5,'rgba(217,43,31,.28)');g.addColorStop(1,'rgba(242,228,199,.12)');
        c.strokeStyle='rgba(0,0,0,.35)';c.lineWidth=4;c.beginPath();c.moveTo(x1+2,y1+2);c.lineTo(x2+2,y2+2);c.stroke();c.lineWidth=1.1;
        c.strokeStyle=g;c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();
      }
    });
  }

  _particles(c,cx,cy,dim,time){
    if(Math.random()<0.05+this.beatPulse*0.12){
      const a=Math.random()*PI2,d=dim*(0.08+Math.random()*0.45);
      this.particles.push({x:cx+Math.cos(a)*d,y:cy+Math.sin(a)*d,
        vx:(Math.random()-0.5)*0.35,vy:-0.25-Math.random()*0.55,life:1,
        sz:0.7+Math.random()*2.4,col:Math.random()<0.18?'#d92b1f':(Math.random()<0.55?'#ead7b8':'#080604')});
    }
    for(let i=this.particles.length-1;i>=0;i--){
      const p=this.particles[i];p.x+=p.vx+Math.sin(time+i)*0.08;p.y+=p.vy;p.life-=0.006;
      if(p.life<=0){this.particles.splice(i,1);continue}
      c.save();c.translate(p.x,p.y);c.rotate(time+i);c.fillStyle=p.col+Math.floor(p.life*70).toString(16).padStart(2,'0');c.fillRect(-p.sz*p.life,-p.sz*.25,p.sz*2*p.life,p.sz*.5);c.restore();
    }
    if(this.particles.length>120)this.particles.splice(0,this.particles.length-120);
  }
}

let tanpura,melody,tabla,pad,bells,vis;
let lastMel=0,lastBell=0;

function init(){
  tanpura=new TanpuraEngine();melody=new MelodyEngine();
  tabla=new DrumEngine();pad=new PadEngine();bells=new BellsEngine();
  vis=new Vis(document.getElementById('c'));
}
function startAll(){tanpura.start();melody.start();tabla.start();pad.start();bells.start()}

function tick(time){
  const rings=vis.rings, trig=Math.PI*1.5, tol=0.06;
  for(let ri=0;ri<2;ri++){
    const a=((time*rings[ri].spd)%PI2+PI2)%PI2;
    if(Math.abs(a-trig)<tol){
      const minI=ri===0?0.8:0.5;
      if(time-lastMel>minI/S.melody.density){
        const e=0.5+Math.abs(rings[ri].spd)*5;
        if(melody.trigger(e)){vis.flash(ri,time*rings[ri].spd);lastMel=time}
      }
    }
  }
  const ba=((time*rings[5].spd)%PI2+PI2)%PI2;
  if(Math.abs(ba-trig)<tol*0.5&&time-lastBell>10){bells.trigger();vis.flash(5,time*rings[5].spd);lastBell=time}
  const beatDur=60/S.tempo,bp=(time%beatDur)/beatDur;
  if(bp<0.05)vis.pulse();
}

let lastT=0,fpsCnt=0,fpsT=0;
function loop(ts){
  if(!S.on)return;
  const time=(ts-S.t0)/1000;lastT=ts;
  fpsCnt++;if(ts-fpsT>1000){S.fps=fpsCnt;fpsCnt=0;fpsT=ts;updateTel(time)}
  tick(time);vis.render(time);requestAnimationFrame(loop);
}

function updateTel(time){
  const m=Math.floor(time/60).toString().padStart(2,'0');
  const s=Math.floor(time%60).toString().padStart(2,'0');
  const root=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'][S.root%12]+(Math.floor(S.root/12)-1);
  const track=tabla&&tabla.patterns[tabla.current]?tabla.patterns[tabla.current].name:'';
  document.getElementById('tel').innerHTML=`<div>◉ LIVE &nbsp;<span class="v">${m}:${s}</span></div><div>SCENE <span class="v">${melody?melody.currentSection:'Tuning'}</span></div><div>ROOT <span class="v">${root}</span> &nbsp; TEMPO <span class="v">${S.tempo}</span></div><div>DRUMS <span class="v">${track}</span></div><div>SAMPLES <span class="v">${melody?melody.sampleStatus:'idle'}</span> &nbsp; FPS <span class="v">${S.fps}</span></div>`;
}
function updateInfo(){
  const R=RAAGS[S.raag];
  document.getElementById('rn').textContent=R.name;
  document.getElementById('rm').textContent=`${R.thaat} · ${R.time} · Vadi: ${['Sa','re','Re','ga','Ga','Ma','Ma♯','Pa','dha','Dha','ni','Ni'][R.vadi]}`;
}

    <div class="credit" id="sample-credit">loading real audio samples · tonejs-instruments + FluidR3 samples CC-BY 3.0</div>
  </div>
  <div class="pnl" data-pnl="moods"><div class="pnl-h"><span class="pnl-t">Moods</span></div>
    <div class="btn-row"><button class="btn" data-m="dhyan">Dhyan</button><button class="btn" data-m="sandhya">Sandhya</button><button class="btn" data-m="ratri">Ratri</button><button class="btn" data-m="prabhat">Prabhat</button><button class="btn" data-m="viraha">Viraha</button><button class="btn" data-m="utsav">Utsav</button></div>
  </div>`;
  bindUI();
}

function bindUI(){
  const $=id=>document.getElementById(id);
  const refreshPatterns=()=>{const s=$('u-dpat');if(s)s.innerHTML=drumPatternOptions(S.drums.type)};
  $('u-raag').onchange=e=>{S.raag=e.target.value;melody.phrase=[];melody.pos=0;melody.recompose(true);updateInfo()};
  $('u-root').onchange=e=>{S.root=parseInt(e.target.value)+48;tanpura.stop();pad.stop();
    setTimeout(()=>{tanpura.retune();tanpura.start();pad.start()},2000)};
  $('u-tempo').oninput=e=>{S.tempo=+e.target.value;$('v-tempo').textContent=S.tempo};
  $('u-master').oninput=e=>{S.master=e.target.value/100;$('v-master').textContent=(S.master*100|0)+'%';
    tanpura.setVol(S.tanpura.vol);melody.setVol(S.melody.vol);tabla.setVol(S.drums.vol);pad.setVol(S.pad.vol);bells.setVol(S.bells.vol)};
  $('u-tune').onchange=e=>{S.tanpura.tuning=e.target.value;tanpura.retune()};
  $('u-tsp').oninput=e=>{S.tanpura.speed=e.target.value/100;$('v-tsp').textContent=S.tanpura.speed.toFixed(1)+'x'};
  $('u-drum').onchange=e=>{S.drums.type=e.target.value;S.drums.pattern=0;tabla.reset();refreshPatterns()};
  $('u-dpat').onchange=e=>{S.drums.pattern=+e.target.value;tabla.reset()};
  $('u-inst').onchange=e=>{S.melody.instrument=e.target.value;melody.preloadSamples()};
  $('u-form').onchange=e=>{S.melody.form=e.target.value;melody.recompose(true)};
  $('u-den').oninput=e=>{S.melody.density=e.target.value/100;$('v-den').textContent=S.melody.density.toFixed(1);melody.recompose(false)};
  $('u-oct').onchange=e=>{S.melody.octave=+e.target.value};

  document.querySelectorAll('[data-a="t"]').forEach(btn=>{
    btn.onclick=()=>{const k=btn.dataset.l;S[k].on=!S[k].on;btn.textContent=S[k].on?'ON':'OFF';
      btn.classList.toggle('on',S[k].on);
      const dot=btn.parentElement.querySelector('.ldot');dot.classList.toggle('on',S[k].on);dot.classList.toggle('off',!S[k].on)}
  });
  document.querySelectorAll('.lvol').forEach(sl=>{
    sl.oninput=()=>{const k=sl.dataset.l;S[k].vol=sl.value/100;
      ({tanpura,melody,drums:tabla,pad,bells})[k]?.setVol(S[k].vol)}
  });
  document.querySelectorAll('[data-m]').forEach(btn=>{btn.onclick=()=>loadMood(btn.dataset.m)});
}

function loadMood(m){
  const moods={
    dhyan:{raag:'bhupali',tempo:42,tune:'standard',tsp:0.8,mel:{density:0.3,octave:4,instrument:'esraj',form:'alapgat'},drm:{vol:0.18,type:'kit',pattern:0}},
    sandhya:{raag:'yaman',tempo:60,tune:'standard',tsp:1.0,mel:{density:0.5,octave:4,instrument:'bansuri',form:'bandish'},drm:{vol:0.34,type:'kit',pattern:1}},
    ratri:{raag:'malkauns',tempo:50,tune:'kharaj',tsp:0.9,mel:{density:0.4,octave:4,instrument:'esraj',form:'thumri'},drm:{vol:0.28,type:'kit',pattern:2}},
    prabhat:{raag:'bhairavi',tempo:55,tune:'madhyam',tsp:1.0,mel:{density:0.5,octave:4,instrument:'bansuri',form:'bhajan'},drm:{vol:0.32,type:'kit',pattern:3}},
    viraha:{raag:'bageshri',tempo:48,tune:'standard',tsp:0.85,mel:{density:0.35,octave:4,instrument:'shehnai',form:'thumri'},drm:{vol:0.26,type:'kit',pattern:4}},
    utsav:{raag:'shivranjani',tempo:90,tune:'pancham',tsp:1.2,mel:{density:0.7,octave:5,instrument:'santoor',form:'folk'},drm:{vol:0.5,type:'kit',pattern:5}},
  };
  const d=moods[m];if(!d)return;
  S.raag=d.raag;S.tempo=d.tempo;S.tanpura.tuning=d.tune;S.tanpura.speed=d.tsp;
  if(d.mel){S.melody.density=d.mel.density;S.melody.octave=d.mel.octave;S.melody.instrument=d.mel.instrument;S.melody.form=d.mel.form||S.melody.form}
  if(d.drm){S.drums.vol=d.drm.vol;S.drums.type=d.drm.type;S.drums.pattern=d.drm.pattern;tabla.setVol(S.drums.vol);tabla.reset()}
  tanpura.retune();melody.phrase=[];melody.pos=0;melody.recompose(true);
  updateInfo();buildUI();
}

// ── BOOT ─────────────────────────────────────────────────────────
async function boot(){
  const b=document.getElementById('boot');
  b.querySelector('.hint').textContent='awakening...';
  await AC.resume();await new Promise(r=>setTimeout(r,300));
  b.querySelector('.hint').textContent='tuning tanpura...';
  await new Promise(r=>setTimeout(r,400));
  init();buildUI();updateInfo();
  b.querySelector('.hint').textContent='entering...';
  await new Promise(r=>setTimeout(r,300));
  b.classList.add('gone');
  S.on=true;S.t0=performance.now();lastT=performance.now();fpsT=performance.now();
  startAll();requestAnimationFrame(loop);
}
document.getElementById('boot').addEventListener('click',boot);
document.getElementById('tog').addEventListener('click',()=>document.getElementById('ui').classList.toggle('open'));
document.addEventListener('keydown',e=>{
  if(e.key===' '){e.preventDefault();S.on=!S.on;if(S.on){lastT=performance.now();requestAnimationFrame(loop)}}
  if(e.key==='c'||e.key==='C')document.getElementById('ui').classList.toggle('open');
});
</script>
